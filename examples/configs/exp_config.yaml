# s2p2 ----------------------------
S2P2_train:
  base_config:
    stage: train
    backend: torch
    dataset_id: mimic_3_norm
    runner_id: std_tpp
    model_id: S2P2
    base_dir: './checkpoints/S2P2/mimic_3_norm'
  trainer_config:
    batch_size: 32
    max_epoch: 60
    shuffle: True
    optimizer: adam
    learning_rate: 5.e-4
    valid_freq: 1
    use_tfb: False
    metrics: ['acc', 'acc_gt_time', 'mae', 'rmse', 'mae_log', 'rmse_log']
    seed: 2019
    gpu: 0  # ID of GPU to use. Set to -1 to use CPU instead. `mps` backend could lead to incorrect results, please use CPU or CUDA.
  model_config:
    hidden_size: 128
    loss_integral_num_sample_per_step: 10
    use_mc_samples: True
    num_layers: 8
    model_specs:
      P: 64  # Number of dimensions for the hidden state x_t, labeled as P in the paper.
      dropout_rate: 0.1  # Dropout rate, used immediately after the activation function between layers but before the normalization. Formally, we set u^{(l+1)}_t = LayerNorm(dropout(\sigma(y^{(l)}_t)) + u^{(l)}_t).
      act_func: gelu  # gelu | half_glu | full_glu  # Activation function to use between layers.
      for_loop: True  # If enabled, uses for-loop for computing the recurrence in the LLH layers. If disabled, uses a parallel scan.
      pre_norm: False  # Should be set to False. If True, uses a LayerNorm on the inputs to a LLH layer.
      post_norm: True  # Should be set to True. If True, uses a LayerNorm on the outputs of a LLH layer (after transforming and adding the residual).
      int_forward_variant: False  # Should be set to False. If True, uses u_{t_i} as the ZOH constant for u_t with t \in (t_i, t_{i+1}].
      int_backward_variant: True  # Should be set to True. If True, uses u_{t_{i+1}-} as the ZOH constant for u_t with t \in (t_i, t_{i+1}].
      relative_time: True  # If True, predicts the scaling factor to be applied to the dynamics between each pair of subsequent events. See Sec. 3.3 of the paper.


S2P2_eval:
  base_config:
    stage: eval
    backend: torch
    dataset_id: ukb_cd_norm
    runner_id: std_tpp
    base_dir: './checkpoints/S2P2'
    model_id: S2P2
  trainer_config:
    batch_size: 32
    max_epoch: 1
    gpu: 0
    metrics: ['acc', 'acc_gt_time', 'mae', 'rmse', 'mae_log', 'rmse_log', 'ukb_mae', 'ukb_rmse']
  model_config:
    pretrained_model_dir: ./checkpoints/S2P2/ukb_cd_norm/104908_140028145624896_260505-170755/models/saved_model
    # /home/bml/storage/mnt/v-044d0fb740b04ad3/org/lidiwang/mcts/EasyTemporalPointProcess/checkpoints/S2P2/ukb_cd_norm/104908_140028145624896_260505-170755/models/saved_model
    gpu: 0
    hidden_size: 128
    loss_integral_num_sample_per_step: 10
    use_mc_samples: True
    num_layers: 4
    model_specs:
      P: 64  # Number of dimensions for the hidden state x_t, labeled as P in the paper.
      dropout_rate: 0.1  # Dropout rate, used immediately after the activation function between layers but before the normalization. Formally, we set u^{(l+1)}_t = LayerNorm(dropout(\sigma(y^{(l)}_t)) + u^{(l)}_t).
      act_func: gelu  # gelu | half_glu | full_glu  # Activation function to use between layers.
      for_loop: True  # If enabled, uses for-loop for computing the recurrence in the LLH layers. If disabled, uses a parallel scan.
      pre_norm: False  # Should be set to False. If True, uses a LayerNorm on the inputs to a LLH layer.
      post_norm: True  # Should be set to True. If True, uses a LayerNorm on the outputs of a LLH layer (after transforming and adding the residual).
      int_forward_variant: False  # Should be set to False. If True, uses u_{t_i} as the ZOH constant for u_t with t \in (t_i, t_{i+1}].
      int_backward_variant: True  # Should be set to True. If True, uses u_{t_{i+1}-} as the ZOH constant for u_t with t \in (t_i, t_{i+1}].
      relative_time: True  # If True, predicts the scaling factor to be applied to the dynamics between each pair of subsequent events. See Sec. 3.3 of the paper.
    thinning:
      num_seq: 2
      num_sample: 100
      num_exp: 50 # number of i.i.d. Exp(intensity_bound) draws at one time in thinning algorithm
      look_ahead_time: 10
      patience_counter: 5 # the maximum iteration used in adaptive thinning
      over_sample_rate: 5
      num_samples_boundary: 5
      dtime_max: 5
      num_step_gen: 100


